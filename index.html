<!DOCTYPE html>
<html>
<head>
  <title>Genify</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0;font-family:sans-serif;background:#020617;color:white;">

<div style="padding:20px;max-width:500px;margin:auto;">

  <h2>⚡ Genify</h2>
  <p style="opacity:0.6;">AI Video Generator</p>

  <!-- INPUT LINK -->
  <input id="linkInput" placeholder="Paste link produk..." 
  style="width:100%;padding:14px;border-radius:12px;border:none;margin-top:15px;background:#0f172a;color:white;" />

  <!-- TEMPLATE -->
  <h3 style="margin-top:25px;">🎬 Template</h3>

  <div style="display:flex;gap:10px;overflow:auto;">
    <div onclick="selectTemplate(event,'ugc')" class="card selected">UGC</div>
    <div onclick="selectTemplate(event,'hook')" class="card">Hook</div>
    <div onclick="selectTemplate(event,'review')" class="card">Review</div>
    <div onclick="selectTemplate(event,'ads')" class="card">Ads</div>
  </div>

  <!-- BUTTON -->
  <button onclick="generateAI()" class="btn blue">🚀 Generate AI</button>
  <button onclick="playVoice()" class="btn green">🔊 Voice</button>

  <!-- VIDEO PREVIEW -->
  <div id="videoBox">
    <div id="videoText">Hasil AI muncul di sini...</div>
  </div>

</div>

<style>
.card{
  min-width:90px;
  padding:12px;
  background:#1e293b;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

.selected{
  outline:2px solid #3b82f6;
}

.btn{
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  border-radius:12px;
  color:white;
  font-weight:bold;
}

.blue{background:#3b82f6;}
.green{background:#22c55e;}

#videoBox{
  margin-top:20px;
  height:400px;
  border-radius:20px;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

#videoText{
  font-size:18px;
  text-align:center;
  white-space:pre-line;
}
</style>

<script>
let selectedTemplate = "ugc";

function selectTemplate(e, type){
  selectedTemplate = type;
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));
  e.currentTarget.classList.add('selected');
}

async function generateAI(){
  const link = document.getElementById("linkInput").value;

  if(!link){
    alert("Masukkan link dulu!");
    return;
  }

  const el = document.getElementById("videoText");
  el.innerText = "⏳ Generating AI...";

  try {
    const res = await fetch("/api/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        link: link,
        template: selectedTemplate
      })
    });

    const data = await res.json();

    el.innerText = data.script || "Gagal generate 😢";

  } catch (err) {
    el.innerText = "Error koneksi API ❌";
  }
}

function playVoice(){
  const text = document.getElementById("videoText").innerText;

  if(!text){
    alert("Generate dulu!");
    return;
  }

  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "id-ID";
  speech.rate = 1;

  speechSynthesis.speak(speech);
}
</script>

</body>
</html>
