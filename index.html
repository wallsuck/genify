<!DOCTYPE html>
<html>
<head>
  <title>Genify</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; font-family:sans-serif; background:#020617; color:white;">

<div style="padding:20px; max-width:500px; margin:auto;">

  <h2>⚡ Genify</h2>
  <p style="opacity:0.6;">UGC Video Generator</p>

  <input id="linkInput" placeholder="Paste link Shopee..." 
  style="width:100%; padding:14px; border-radius:12px; border:none; margin-top:15px; background:#0f172a; color:white;" />

  <h3 style="margin-top:25px;">🎬 Pilih Template</h3>

  <div style="display:flex; overflow:auto; gap:12px;">

    <div onclick="selectTemplate(event,'ugc')" class="card selected">🎤 UGC</div>
    <div onclick="selectTemplate(event,'unboxing')" class="card">📦 Unbox</div>
    <div onclick="selectTemplate(event,'hook')" class="card">⚡ Hook</div>
    <div onclick="selectTemplate(event,'before')" class="card">📊 Before</div>

  </div>

  <button onclick="generatePreview()" class="btn blue">🎬 Generate Preview</button>
  <button onclick="playVoice()" class="btn green">🔊 Play Voice</button>

  <div id="videoBox">
    <div id="videoText">Preview muncul di sini</div>
  </div>

</div>

<style>
.card {
  min-width:100px;
  padding:15px;
  background:#1e293b;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
}

.selected {
  outline:2px solid white;
}

.btn {
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  color:white;
}

.blue { background:#3b82f6; }
.green { background:#22c55e; }

#videoBox {
  margin-top:20px;
  height:400px;
  border-radius:20px;
  background:url('https://images.unsplash.com/photo-1523275335684-37898b6baf30') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

#videoText {
  font-size:18px;
  font-weight:bold;
  text-align:center;
  background:rgba(0,0,0,0.5);
  padding:10px;
  border-radius:10px;
}
</style>

<script>
let selectedTemplate = "ugc";

function selectTemplate(e, type) {
  selectedTemplate = type;
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  e.currentTarget.classList.add('selected');
}

function generatePreview() {
  const link = document.getElementById("linkInput").value;

  if (!link) {
    alert("Masukkan link dulu!");
    return;
  }

  let text = "";

  if (selectedTemplate === "ugc") {
    text = "Gue nemu produk ini...\nWajib coba banget!";
  }

  if (selectedTemplate === "unboxing") {
    text = "Unboxing produk ini...\nKeren banget!";
  }

  if (selectedTemplate === "hook") {
    text = "STOP SCROLL!\nIni lagi viral!";
  }

  if (selectedTemplate === "before") {
    text = "Sebelum vs Sesudah\nBeda banget!";
  }

  document.getElementById("videoText").innerText = text;
}

function playVoice() {
  const text = document.getElementById("videoText").innerText;

  if (!text) {
    alert("Generate dulu!");
    return;
  }

  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "id-ID";
  speech.rate = 1;
  speech.pitch = 1;

  speechSynthesis.speak(speech);
}
</script>

</body>
</html>
