<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Genify - AI Video Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

  <!-- Navbar -->
  <div class="flex justify-between items-center p-4 border-b border-gray-800">
    <h1 class="font-bold text-lg">Genify</h1>
    <span class="text-sm text-gray-400">AI Content</span>
  </div>

  <!-- Hero -->
  <div class="text-center px-6 py-10">
    <h2 class="text-3xl font-bold mb-3">
      Ubah Link Jadi Video Otomatis
    </h2>
    <p class="text-gray-400 mb-6">
      Cocok untuk Shopee, TikTok, Affiliate 🔥
    </p>

    <input 
      type="text" 
      placeholder="Paste link produk disini..." 
      class="w-full p-3 rounded-lg text-black mb-3"
    />

    <button class="bg-white text-black px-6 py-3 rounded-lg font-semibold w-full">
      Generate Video
    </button>
  </div>

  <!-- Template Section -->
  <div class="px-6">
    <h3 class="mb-3 font-semibold">Pilih Template</h3>

    <div class="grid grid-cols-2 gap-3">
      <div class="bg-gray-900 p-4 rounded-xl">UGC Style</div>
      <div class="bg-gray-900 p-4 rounded-xl">Review Style</div>
      <div class="bg-gray-900 p-4 rounded-xl">Promo Style</div>
      <div class="bg-gray-900 p-4 rounded-xl">TikTok Viral</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="text-center text-xs text-gray-500 py-6">
    Genify v1 - Build from HP 🚀
  </div>

</body>
</html>
